##################################
#            PICOM CONF          #
#   Blur + Rounded corners + FX  #
##################################

backend = "glx";
vsync = true;

##################################
#         TRANSPARENCIA         #
##################################

inactive-opacity = 0.98;
active-opacity = 0.98;

opacity-rule = [
  "90:class_g = 'Rofi'"
];

##################################
#            BLUR               #
##################################

blur-method = "dual_kawase";
blur-strength = 8;

blur-background = true;

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Conky'",
  "class_g = 'i3-frame'",
  "class_g = 'Polybar'",
  "class_g = 'rofi' && !focused"
];

##################################
#           BORDES              #
##################################

corner-radius = 15;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

##################################
#           SOMBRAS             #
##################################

shadow = true;
shadow-radius = 6;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-opacity = 0.3;

shadow-exclude = [
  "class_g = 'Conky'",
  "class_g = 'i3-frame'",
  "class_g = 'Polybar'",
  "name = 'Notification'",
  "name *= 'Screenshot'"
];

##################################
#         FADING EFECTOS        #
##################################

fading = false;

##################################
#         DETECCIÓN            #
##################################

detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;

use-damage = true;
