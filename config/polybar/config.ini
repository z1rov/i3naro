[global/wm]
margin-bottom = 0
margin-top = 0

include-file = ~/.config/polybar/bars.ini
include-file = ~/.config/polybar/colors.ini
include-file = ~/.config/polybar/modules.ini
include-file = ~/.config/polybar/user_modules.ini

[bar/main]
monitor =
monitor-fallback =
monitor-strict = false
override-redirect = false
vm-restack = i3
bottom = false
fixed-center = true
width = 100%
height = 50
offset-x = 0%
offset-y = 0%
background = ${color.background}
foreground = ${color.foreground}
radius-top = 0
radius-bottom = 0
line-size = 5
line-color = FF0000
border-bottom-size = 2
border-bottom-color = FF0000
padding = 2
module-margin-left = 1
module-margin-right = 1

font-0 = "xos4 Terminus:size=20;3"
font-1 = "waffle:size=30;3"
font-2 = "JetBrainsMono Nerd Font:size=12;3"
font-3 = "Font Awesome 6 Free:style=Solid:size=7:6"
font-4 = "Symbols Nerd Font Mono:size=14;3"
font-5 = "JetBrainsMono Nerd Font:size=12;3"
font-6 = "FontAwesome:size=10;3"
font-7 = "MaterialIcons:size=10;3"
font-8 = "NotoSans-Regular:size=8;3"

modules-left = workspaces sep netsmart sep
modules-center = date
modules-right = sep battery sep pulseaudio sep target

separator =
dim-value = 1.0
wm-name = 
locale = 
tray-position = none
tray-detached = false
tray-maxsize = 16
tray-background = ${color.background}
tray-offset-x = 0
tray-offset-y = 0
tray-padding = 0
tray-scale = 1.0
enable-ipc = true
click-left = 
click-middle = 
click-right =
scroll-up =
scroll-down =
double-click-left =
double-click-middle =
double-click-right =
cursor-click = 
cursor-scroll = 

[settings]
throttle-output = 5
throttle-output-for = 10
screenchange-reload = false
compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over
pseudo-transparency = false
