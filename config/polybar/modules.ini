

[module/alsa]
type = internal/alsa

master-soundcard = default
speaker-soundcard = default
headphone-soundcard = default

master-mixer = Master




interval = 5

format-volume = <ramp-volume> <label-volume>

format-muted = <label-muted>
format-muted-prefix = оИВ
format-muted-prefix-foreground = ${color.red}

label-volume = %percentage%%

label-muted = " Muted"
label-muted-foreground = ${color.sep}


ramp-volume-0 = пА¶ гЕ§гЕ§  
ramp-volume-1 = пА® гЕ§  
ramp-volume-2 = пА® гЕ§  
ramp-volume-3 = пА®гЕ§ гЕ§гЕ§гЕ§гЕ§
ramp-volume-4 = пА®гЕ§ гЕ§гЕ§гЕ§гЕ§  
ramp-volume-foreground = FFFFFF

ramp-headphones-0 = оБН
ramp-headphones-background = ${color.blue}


[module/backlight]
type = internal/backlight

card = amdgpu_bl0

format = <ramp> <label>

label = %percentage%%

ramp-0 = оКИ
ramp-1 = оКИ
ramp-2 = оКИ
ramp-3 = оКИ
ramp-4 = оКИ
ramp-foreground = ${color.lime}


[module/battery]
type = internal/battery

full-at = 99

battery = BAT0
adapter = ACAD

poll-interval = 2

time-format = %H:%M

format-charging = <animation-charging> <label-charging>

format-discharging = <ramp-capacity> <label-discharging>

format-full = <label-full>
format-full-prefix = оИБ
format-full-prefix-foreground = ${color.red}

label-charging = %percentage%%

label-discharging = %percentage%%

label-full = " Full"


ramp-capacity-0 = пЙДгЕ§гЕ§ гЕ§гЕ§
ramp-capacity-1 = пЙГ гЕ§гЕ§
ramp-capacity-2 = пЙВ гЕ§гЕ§
ramp-capacity-3 = пЙБ гЕ§гЕ§
ramp-capacity-4 = пЙА гЕ§гЕ§
ramp-capacity-foreground = FFFFFF


animation-charging-0 = пЙДгЕ§гЕ§гЕ§гЕ§ гЕ§гЕ§
animation-charging-1 = пЙВ гЕ§гЕ§
animation-charging-2 = пЙА гЕ§гЕ§
animation-charging-foreground = ffFFFF


animation-charging-framerate = 750






















[module/cpu]
type = internal/cpu

interval = 1

format = <label>
format-prefix = оА¶
format-prefix-foreground = ${color.yellow}

label = " %percentage%%"




[module/date]
type = internal/date

interval = 1.0

date = %A, %d %B

time = at %I:%M %p

date-alt = It's %A, %d %B %Y
time-alt = at %k:%M:%S

format = <label>
format-prefix = "пАЧ  "
format-prefix-foreground = ${color.red}

label = %date% %time%


[module/filesystem]
type = internal/fs

mount-0 = /

interval = 30

fixed-values = true


format-mounted = <label-mounted>
format-mounted-prefix = оВЂ
format-mounted-prefix-foreground = ${color.orange}

format-unmounted = <label-unmounted>
format-unmounted-prefix = оЗД
format-unmounted-prefix-foreground = ${color.red}

label-mounted = " %free%"

label-unmounted = " %mountpoint%: NA"




























[module/memory]
type = internal/memory

interval = 1

format = <label>
format-prefix = оА°
format-prefix-foreground = ${color.blue}


label = " %mb_used%"




[module/mpd]
type = internal/mpd


interval = 1

format-online = <label-song> <icon-prev> <toggle> <icon-next>
format-online-prefix = оЖ¶
format-online-prefix-foreground = ${color.green}


format-offline = <label-offline>
format-offline-prefix = оЖ¶
format-offline-prefix-foreground = ${color.red}

label-song =  " %artist% - %title%"
label-song-maxlen = 25
label-song-ellipsis = true

label-time = %elapsed% / %total%
label-time-background = ${color.background-alt}
label-time-padding = 1

label-offline = " Offline"

icon-play = оБШ
icon-play-foreground = ${color.cyan}
icon-pause = оБЩ
icon-pause-foreground = ${color.cyan}
icon-stop = оБЧ
icon-stop-foreground = ${color.red}
icon-next = оВЭ
icon-next-foreground = ${color.cyan}
icon-prev = оВЧ
icon-prev-foreground = ${color.cyan}
icon-seekf = 
icon-seekb = 
icon-random = 
icon-repeat = 
icon-repeatone = 
icon-single = 
icon-consume =

toggle-on-foreground = ${color.primary}
toggle-off-foreground = ${color.red}





[module/netsmart]
type = custom/script
exec = ~/.config/polybar/scripts/net-smart
interval = 5
click-left = ~/.config/polybar/scripts/copy-netip
label = %output%
[module/target]
type = custom/script
exec = ~/.config/polybar/scripts/target-polybar
interval = 2
hook-0 = ~/.config/polybar/scripts/target-polybar
initial = 1
click-left = ~/.config/polybar/scripts/copy-targetip
label = %output%



[module/pulseaudio]
type = internal/pulseaudio

sink = alsa_output.pci-0000_03_00.6.analog-stereo

use-ui-max = false

interval = 5

format-volume = <ramp-volume> <label-volume>

format-muted = <label-muted>
format-muted-prefix = оИВ
format-muted-prefix-foreground = ${color.red}

label-volume = %percentage%%

label-muted = " Muted"
label-muted-foreground = ${color.sep}

ramp-volume-0 = оИД
ramp-volume-1 = оИГ
ramp-volume-2 = оИГ
ramp-volume-3 = оИГ
ramp-volume-4 = оИГ
ramp-volume-foreground = ${color.blue}


[module/temperature]
type = internal/temperature

interval = 0.5

thermal-zone = 0

hwmon-path = /sys/devices/pci0000:00/0000:00:01.3/0000:01:00.0/hwmon/hwmon0/temp1_input

warn-temperature = 65

units = true

format = <ramp> <label>

format-warn = <ramp> <label-warn>

label = %temperature-c%

label-warn = "%temperature-c%"
label-warn-foreground = ${color.red}

ramp-0 = оГН
ramp-1 = оГН
ramp-2 = оГМ
ramp-3 = оГМ
ramp-4 = оГМ
ramp-foreground = ${color.cyan}


[module/keyboard]
type = internal/xkeyboard

blacklist-0 = num lock
blacklist-1 = scroll lock

format = <label-layout> <label-indicator>
format-prefix = оЙѓ
format-prefix-foreground = ${color.blue-gray}

label-layout = " %layout%"

label-indicator-on = "%name%"
label-indicator-on-foreground = ${color.cyan}


[module/title]
type = internal/xwindow

format = <label>
format-prefix =%{F#FF0000}пТР%{F-}гЕ§гЕ§ гЕ§гЕ§гЕ§гЕ§
format-foreground = FFFFFF

label = " %title%"
label-maxlen = 30

label-empty = " Desktop"


[module/workspaces]
type = internal/xworkspaces

pin-workspaces = true

enable-click = true

enable-scroll = true

icon-0 = 1;оЖЉ
icon-1 = 2;оЖЉ
icon-2 = 3;оЖЉ
icon-3 = 4;оЖЉ
icon-4 = 5;оЖЉ
icon-default = оЖЉ

format = <label-state>

label-monitor = %name%

label-active =вЧЙ
label-active-foreground = FF0000
label-occupied =вЧЛ
label-occupied-foreground = FFFFFF

label-urgent = оЗД
label-urgent-foreground = ${color.red}

label-empty = оЖЉ
label-empty-foreground = ${color.foreground}

label-active-padding = 1
label-urgent-padding = 1
label-occupied-padding = 1
label-empty-padding = 1

